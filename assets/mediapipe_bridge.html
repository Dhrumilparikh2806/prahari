<!DOCTYPE html>
<!--
  mediapipe_bridge.html — 100% OFFLINE MediaPipe Bridge
  ======================================================
  All assets (WASM runtime + face landmark model) are loaded from
  the local Android asset directory (file:///android_asset/).
  NO internet connection required after APK is installed.

  File layout inside the APK (android_asset/):
    mediapipe_bridge.html             ← this file
    mediapipe_wasm/
      vision_bundle.mjs              ← MediaPipe JS (bundled from node_modules)
      vision_wasm_internal.js        ← SIMD WASM loader
      vision_wasm_internal.wasm      ← SIMD WASM binary
      vision_wasm_nosimd_internal.js ← no-SIMD fallback loader
      vision_wasm_nosimd_internal.wasm
    models/
      face_landmarker.task           ← 468-point face landmark model

  Protocol (React Native ↔ WebView):
    RN → WebView:  { type: 'PROCESS_FRAME', imageBase64, seq }
    WebView → RN:  { type: 'READY' }
                   { type: 'LANDMARKS', landmarks, frameWidth, frameHeight, seq }
                   { type: 'NO_FACE', seq }
                   { type: 'ERROR', message }
-->
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>body{margin:0;background:transparent;}canvas,img{display:none;}</style>
</head>
<body>
<canvas id="c"></canvas>
<img id="img">
<script type="module">
// Load MediaPipe from LOCAL assets — 100% offline, no CDN
import { FaceLandmarker, FilesetResolver }
  from "./mediapipe_wasm/vision_bundle.mjs";

let faceLandmarker = null;
let isReady = false;

function post(data) {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify(data));
  }
}

// 60-second timeout so UI doesn't freeze if something goes wrong
const timeout = setTimeout(() => {
  if (!isReady) post({ type: 'ERROR', message: 'Initialisation timeout (60s)' });
}, 60000);

async function init() {
  try {
    // Load WASM runtime from LOCAL assets (relative to this HTML file)
    // file:///android_asset/mediapipe_wasm/ — all offline, no network call
    const vision = await FilesetResolver.forVisionTasks("./mediapipe_wasm/");

    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: {
        // Load face landmark model from LOCAL assets — zero network
        modelAssetPath: "./models/face_landmarker.task",
        delegate: "CPU"
      },
      outputFaceBlendshapes: false,
      outputFacialTransformationMatrixes: false,
      runningMode: "IMAGE",
      numFaces: 1
    });

    clearTimeout(timeout);
    isReady = true;
    post({ type: "READY" });
  } catch (err) {
    clearTimeout(timeout);
    post({ type: "ERROR", message: "Init failed: " + String(err) });
  }
}

async function processFrame(imageBase64, seq) {
  if (!isReady || !faceLandmarker) return;
  try {
    const canvas = document.getElementById("c");
    const ctx    = canvas.getContext("2d");
    const img    = document.getElementById("img");

    await new Promise((resolve, reject) => {
      img.onload = resolve;
      img.onerror = reject;
      img.src = imageBase64.startsWith("data:") ? imageBase64
              : "data:image/jpeg;base64," + imageBase64;
    });

    canvas.width  = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.drawImage(img, 0, 0);

    const result = faceLandmarker.detect(canvas);

    if (!result?.faceLandmarks?.length) {
      post({ type: "NO_FACE", seq });
      return;
    }

    const landmarks = result.faceLandmarks[0].map(
      lm => ({ x: lm.x, y: lm.y, z: lm.z || 0 })
    );
    post({
      type: "LANDMARKS", landmarks,
      count: landmarks.length,
      frameWidth: canvas.width,
      frameHeight: canvas.height,
      seq
    });
  } catch (err) {
    post({ type: "ERROR", message: "Frame error: " + String(err) });
  }
}

window.addEventListener("message", (event) => {
  let msg;
  try { msg = JSON.parse(event.data); } catch { return; }
  if (msg.type === "PROCESS_FRAME") processFrame(msg.imageBase64, msg.seq || 0);
});

// Android WebView fires 'message' on document (not window)
document.addEventListener("message", (event) => {
  window.dispatchEvent(new MessageEvent("message", { data: event.data }));
});

init();
</script>
</body>
</html>
