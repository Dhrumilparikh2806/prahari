<!DOCTYPE html>
<!--
  mediapipe_bridge.html — PRAHARI MediaPipe FaceLandmarker Bridge
  ================================================================
  Loads @mediapipe/tasks-vision from CDN (cached after first load).
  The device needs internet once for CDN caching; after that it works offline.

  Protocol (WebView ↔ React Native):
    RN → WebView:  { type: 'PROCESS_FRAME', imageBase64: '<data:image/jpeg;base64,...>', seq: number }
    WebView → RN:  { type: 'READY' }
                   { type: 'LANDMARKS', landmarks: [{x,y,z}×468], frameWidth, frameHeight, seq }
                   { type: 'NO_FACE', seq }
                   { type: 'ERROR', message }
-->
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>body{margin:0;background:transparent;} canvas,img{display:none;}</style>
</head>
<body>
<canvas id="c"></canvas>
<img id="img">
<script>
'use strict';

var faceLandmarker = null;
var isReady = false;

/* Post message to React Native */
function post(data) {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify(data));
  }
}

/* Load MediaPipe from CDN and initialize FaceLandmarker */
async function init() {
  try {
    // Load vision bundle from CDN (cached by WebView after first load)
    await new Promise(function(resolve, reject) {
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/vision_bundle.js';
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });

    var FilesetResolver = window.FilesetResolver;
    var FaceLandmarker = window.FaceLandmarker;

    if (!FilesetResolver || !FaceLandmarker) {
      throw new Error('MediaPipe classes not found after script load');
    }

    var vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm'
    );

    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
        delegate: 'CPU'
      },
      outputFaceBlendshapes: false,
      outputFacialTransformationMatrixes: false,
      runningMode: 'IMAGE',
      numFaces: 1
    });

    isReady = true;
    post({ type: 'READY' });
  } catch (err) {
    post({ type: 'ERROR', message: 'FaceLandmarker init failed: ' + String(err) });
  }
}

/* Process one camera frame */
async function processFrame(imageBase64, seq) {
  if (!isReady || !faceLandmarker) {
    post({ type: 'ERROR', message: 'Not ready' });
    return;
  }

  try {
    var canvas = document.getElementById('c');
    var ctx = canvas.getContext('2d');
    var img = document.getElementById('img');

    /* Load JPEG into hidden <img> */
    await new Promise(function(resolve, reject) {
      img.onload = resolve;
      img.onerror = reject;
      img.src = imageBase64.startsWith('data:') ? imageBase64
              : 'data:image/jpeg;base64,' + imageBase64;
    });

    canvas.width  = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.drawImage(img, 0, 0);

    var result = faceLandmarker.detect(canvas);

    if (!result || !result.faceLandmarks || result.faceLandmarks.length === 0) {
      post({ type: 'NO_FACE', seq: seq });
      return;
    }

    var landmarks = result.faceLandmarks[0].map(function(lm) {
      return { x: lm.x, y: lm.y, z: lm.z || 0 };
    });

    post({
      type: 'LANDMARKS',
      landmarks: landmarks,
      count: landmarks.length,
      frameWidth: canvas.width,
      frameHeight: canvas.height,
      seq: seq
    });
  } catch (err) {
    post({ type: 'ERROR', message: 'Frame error: ' + String(err) });
  }
}

/* Listen for messages from React Native */
window.addEventListener('message', function(event) {
  var msg;
  try { msg = JSON.parse(event.data); } catch (_) { return; }

  if (msg.type === 'PROCESS_FRAME') {
    processFrame(msg.imageBase64, msg.seq || 0);
  }
});

/* Android WebView fires 'message' on document */
document.addEventListener('message', function(event) {
  window.dispatchEvent(new MessageEvent('message', { data: event.data }));
});

/* Start initialization immediately */
init();
</script>
</body>
</html>
