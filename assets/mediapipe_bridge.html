<!DOCTYPE html>
<!--
  mediapipe_bridge.html — Offline-Capable MediaPipe FaceLandmarker Bridge

  Offline operation via WebView HTTP cache:
    FIRST LAUNCH (WiFi needed, ~15-30s):
      Downloads WASM + model from CDN → Chromium caches them on device
    SUBSEQUENT LAUNCHES (zero network):
      Loads from Chromium cache → works in airplane mode
      WebView cacheMode="LOAD_CACHE_ELSE_NETWORK" enforces this

  Protocol:
    RN → WebView:  { type: 'PROCESS_FRAME', imageBase64, seq }
    WebView → RN:  { type: 'READY' }
                   { type: 'LANDMARKS', landmarks, frameWidth, frameHeight, seq }
                   { type: 'NO_FACE', seq }
                   { type: 'ERROR', message }
-->
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>body{margin:0;background:transparent;}canvas,img{display:none;}</style>
</head>
<body>
<canvas id="c"></canvas>
<img id="img">
<script type="module">
import { FaceLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/vision_bundle.mjs";

let faceLandmarker = null;
let isReady = false;

function post(data) {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify(data));
  }
}

// 90-second timeout — if CDN load fails on first run, surface the error
const timeout = setTimeout(() => {
  if (!isReady) post({ type: 'ERROR', message: 'AI model load timeout. Connect to WiFi for first launch, then it works offline.' });
}, 90000);

async function init() {
  try {
    // WASM loaded from CDN (cached on device after first download)
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
    );

    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate: "CPU"
      },
      outputFaceBlendshapes: false,
      outputFacialTransformationMatrixes: false,
      runningMode: "IMAGE",
      numFaces: 1
    });

    clearTimeout(timeout);
    isReady = true;
    post({ type: "READY" });
  } catch (err) {
    clearTimeout(timeout);
    post({ type: "ERROR", message: "Init failed: " + String(err) });
  }
}

async function processFrame(imageBase64, seq) {
  if (!isReady || !faceLandmarker) return;
  try {
    const canvas = document.getElementById("c");
    const ctx    = canvas.getContext("2d");
    const img    = document.getElementById("img");

    await new Promise((resolve, reject) => {
      img.onload  = resolve;
      img.onerror = reject;
      img.src = imageBase64.startsWith("data:") ? imageBase64
              : "data:image/jpeg;base64," + imageBase64;
    });

    canvas.width  = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.drawImage(img, 0, 0);

    const result = faceLandmarker.detect(canvas);

    if (!result?.faceLandmarks?.length) {
      post({ type: "NO_FACE", seq });
      return;
    }

    const landmarks = result.faceLandmarks[0].map(
      lm => ({ x: lm.x, y: lm.y, z: lm.z || 0 })
    );
    post({ type: "LANDMARKS", landmarks, count: landmarks.length,
           frameWidth: canvas.width, frameHeight: canvas.height, seq });
  } catch (err) {
    post({ type: "ERROR", message: "Frame error: " + String(err) });
  }
}

window.addEventListener("message", (e) => {
  let msg; try { msg = JSON.parse(e.data); } catch { return; }
  if (msg.type === "PROCESS_FRAME") processFrame(msg.imageBase64, msg.seq || 0);
});
document.addEventListener("message", (e) => {
  window.dispatchEvent(new MessageEvent("message", { data: e.data }));
});

init();
</script>
</body>
</html>
